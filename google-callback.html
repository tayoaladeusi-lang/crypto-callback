<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Completing Google Sign-In...</title>
<style>
body{margin:0;background:#06081a;color:#eceaf5;font-family:-apple-system,BlinkMacSystemFont,sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;text-align:center}
.box{padding:40px;max-width:400px}
.logo{font-size:2em;margin-bottom:16px}
h2{font-size:1.1em;font-weight:600;margin-bottom:8px;color:#a78bfa}
p{font-size:.85em;color:#6b6790;line-height:1.5}
.spin{width:40px;height:40px;border:3px solid rgba(124,108,240,.2);border-top-color:#7c6cf0;border-radius:50%;animation:s .8s linear infinite;margin:20px auto}
@keyframes s{to{transform:rotate(360deg)}}
.err{color:#f87171}
</style>
</head>
<body>
<div class="box">
  <div class="logo">&#8383;</div>
  <h2>Crypto Intelligence Pro</h2>
  <div class="spin" id="spinner"></div>
  <p id="status">Completing Google Sign-In...</p>
</div>
<script>
(function(){
  var status = document.getElementById('status');
  var APP_SCHEME = 'com.olutayo.cryptointelligence';

  // ── Collect params from both query string (?) and fragment (#) ──
  var params = {};

  // Query params (for code flow)
  var qp = new URLSearchParams(window.location.search);
  qp.forEach(function(v, k){ params[k] = v; });

  // Fragment params (for implicit flow — tokens come here)
  if(window.location.hash && window.location.hash.length > 1){
    var fp = new URLSearchParams(window.location.hash.substring(1));
    fp.forEach(function(v, k){ params[k] = v; });
  }

  console.log('[Callback] Params:', Object.keys(params));

  // ── Check for errors ──
  if(params.error){
    status.innerHTML = '<span class="err">Sign-In cancelled: ' + params.error + '</span>';
    document.getElementById('spinner').style.display = 'none';
    setTimeout(function(){ tryRedirect({error: params.error}); }, 500);
    return;
  }

  // ── Must have at least one token or code ──
  if(!params.code && !params.id_token && !params.access_token){
    status.innerHTML = '<span class="err">No tokens received from Google.</span>';
    document.getElementById('spinner').style.display = 'none';
    // Still try to redirect back to app with error
    setTimeout(function(){ tryRedirect({error: 'no_tokens'}); }, 1000);
    return;
  }

  // ── Build redirect URL with all params ──
  var redirectParams = new URLSearchParams();
  ['code', 'id_token', 'access_token', 'state', 'token_type', 'expires_in', 'scope'].forEach(function(k){
    if(params[k]) redirectParams.set(k, params[k]);
  });

  status.textContent = 'Redirecting back to app...';

  // ── Also write to Firebase RTDB as backup (polling fallback) ──
  if(params.state){
    try{
      var fbUrl = 'https://mycrypto-intell-def53-default-rtdb.firebaseio.com/oauth_sessions/' + params.state + '.json';
      var payload = {};
      if(params.id_token) payload.id_token = params.id_token;
      if(params.access_token) payload.access_token = params.access_token;
      if(params.code) payload.code = params.code;
      fetch(fbUrl, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload)
      }).catch(function(){});
    }catch(e){}
  }

  // ── Redirect to app via custom scheme ──
  setTimeout(function(){
    tryRedirect(redirectParams);
  }, 300);

  function tryRedirect(p){
    var url = APP_SCHEME + '://oauth2redirect?' + p.toString();
    console.log('[Callback] Redirecting to:', url.slice(0, 80) + '...');

    // Method 1: Direct location (most reliable on Android)
    window.location.href = url;

    // Method 2: Fallback via hidden iframe after 1.5s
    setTimeout(function(){
      var iframe = document.createElement('iframe');
      iframe.style.display = 'none';
      iframe.src = url;
      document.body.appendChild(iframe);
    }, 1500);

    // Method 3: Show manual link after 4s if nothing worked
    setTimeout(function(){
      status.innerHTML = 'If the app didn\'t open, <a href="' + url + '" style="color:#7c6cf0;text-decoration:underline">tap here to return to Crypto Intelligence</a>';
      document.getElementById('spinner').style.display = 'none';
    }, 4000);
  }
})();
</script>
</body>
</html>
